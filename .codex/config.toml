personality = "pragmatic"
model = "gpt-5.6-sol"
model_reasoning_effort = "xhigh"
model_verbosity = "high"

web_search = "live"
show_raw_agent_reasoning = true

approval_policy = "never"
default_permissions = "default"

developer_instructions = "ユーザーへの応答は日本語で行う。"

[permissions."default"]
extends = ":workspace"

[permissions."default".filesystem]
# :workspace が持つワークスペース外への読み取りを拒否。
# 以降のより具体的なパスだけを許可。
":root" = "deny"

# :minimal: コマンド実行に必要なOSランタイムパス（dyld、/usr/lib、/etcなど）。
# ref. https://developers.openai.com/codex/permissions
":minimal" = "read"
"/usr/local/bin" = "read"

# tmp directory
":tmpdir" = "write"
":slash_tmp" = "write"

# SSL
"/System/Library/OpenSSL/openssl.cnf" = "read"

# Homebrew
"/opt/homebrew" = "read"

# macOS developer tools
"/Library/Developer/CommandLineTools" = "read"
"/Applications/Xcode.app/Contents/Developer" = "read"

# git
"~/.gitconfig" = "read"
"~/.config/git" = "read"
"~/.config/gh" = "read"
# gh が macOS Keychain に保存した OAuth token の取得に必要。
# Codex の権限では Keychain 内の資格情報ごとに読み取りを制限できないため、ディレクトリ単位で許可。
"~/Library/Keychains" = "read"

# mise
"~/.local/share/mise" = "write"
"~/.local/state/mise" = "write"
"~/Library/Caches/mise" = "write"

# Go
"~/go/pkg/mod" = "write"
"~/Library/Caches/go-build" = "write"
"~/Library/Application Support/go/env" = "read"
"~/Library/Application Support/go/telemetry" = "write"

# TypeScript
"~/.npm" = "write"
"~/Library/pnpm" = "write"
"~/Library/Caches/pnpm" = "write"

# AI
"~/.agents" = "read"
"~/.codex/skills" = "read"
"~/.codex/plugins" = "read"

# Docker
"~/.docker/config.json" = "read"
"~/.docker/cli-plugins" = "read"
"~/.docker/buildx" = "write"

[permissions."default".filesystem.":workspace_roots"]
"." = "write"
".git" = "write"
".agents" = "write"
".codex" = "write"

"**/gha-creds-*.json" = "deny"
"**/.env*" = "deny"

[permissions."default".network]
enabled = true
allow_local_binding = true

[permissions."default".network.unix_sockets]
"/var/run/docker.sock" = "allow"
"~/.orbstack/run/docker.sock" = "allow"

[tui]
status_line = ["current-dir", "model-with-reasoning", "context-used", "five-hour-limit", "weekly-limit", "run-state"]
theme = "one-half-dark"
status_line_use_colors = true

[tui.model_availability_nux]
"gpt-5.5" = 4
"gpt-5.6-sol" = 4

[analytics]
enabled = false

[plugins."superpowers@openai-curated"]
enabled = true

[mcp_servers.serena]
command = "mise"
args = [
  "x",
  "--",
  "uvx",
  "--from",
  "git+https://github.com/oraios/serena",
  "serena",
  "start-mcp-server",
  "--enable-web-dashboard",
  "false",
  "--context",
  "codex",
]
