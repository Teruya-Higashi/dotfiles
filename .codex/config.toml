personality = "pragmatic"
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
model_verbosity = "high"

web_search = "live"
show_raw_agent_reasoning = true

approval_policy = "never"
default_permissions = "defualt"

[permissions.defualt.filesystem]
":root" = "read"
":tmpdir" = "write"
":slash_tmp" = "write"

[permissions.defualt.filesystem.":workspace_roots"]
"." = "write"
".git" = "write"

[permissions.defualt.network]
enabled = true

[tui]
status_line = ["current-dir", "model-with-reasoning", "context-used", "five-hour-limit", "weekly-limit"]
theme = "one-half-dark"

[tui.model_availability_nux]
"gpt-5.5" = 4

[tools]
view_image = true

[analytics]
enabled = false

[features]
unified_exec = true
multi_agent = true
